<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tic Tac Toe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#222;
    color:#fff;
    text-align:center;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    margin-bottom:10px;
}

#status{
    margin-bottom:20px;
}

.board{
    width:330px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:10px;
}

.cell{
    width:100px;
    height:100px;
    background:#fff;
    color:#000;
    font-size:45px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    cursor:pointer;
}

button{
    padding:10px 20px;
    font-size:18px;
}

@media(max-width:480px){

.board{
    width:270px;
    grid-template-columns:repeat(3,80px);
    gap:8px;
}

.cell{
    width:80px;
    height:80px;
    font-size:35px;
}

}
</style>

</head>
<body>

<h1>Tic Tac Toe</h1>

<h3 id="status">Player 1 (X) Turn</h3>

<div class="board">

<div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>

<div class="cell" data-index="3"></div>
<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>

<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>
<div class="cell" data-index="8"></div>

</div>

<button class="btn btn-success mt-3" onclick="restartGame()">
Restart Game
</button>

<!-- Winner Modal -->

<div class="modal fade" id="winnerModal" data-bs-backdrop="static">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div class="modal-header">
<h4 class="modal-title" style="color: #222;">Game Over</h4>
</div>

<div class="modal-body text-center">
<h2 id="winnerText" style="color: #222;"></h2>
</div>

<div class="modal-footer">

<button class="btn btn-primary" onclick="restartGame()" data-bs-dismiss="modal">
Play Again
</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const cells=document.querySelectorAll(".cell");

let board=["","","","","","","","",""];

let currentPlayer="X";

let gameRunning=true;

const winPattern=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

cells.forEach(cell=>{
cell.addEventListener("click",playGame);
});

function playGame(){

let index=this.dataset.index;

if(board[index]!="" || !gameRunning)
return;

board[index]=currentPlayer;

this.innerHTML=currentPlayer;

checkWinner();

}

function checkWinner(){

for(let pattern of winPattern){

let a=board[pattern[0]];
let b=board[pattern[1]];
let c=board[pattern[2]];

if(a=="" || b=="" || c=="")
continue;

if(a==b && b==c){

gameRunning=false;

if(currentPlayer=="X"){
document.getElementById("winnerText").innerHTML="🏆 Player 1 Wins!";
}
else{
document.getElementById("winnerText").innerHTML="🏆 Player 2 Wins!";
}

let modal=new bootstrap.Modal(document.getElementById("winnerModal"));
modal.show();

return;

}

}

if(!board.includes("")){

gameRunning=false;

document.getElementById("winnerText").innerHTML="🤝 Match Draw!";

let modal=new bootstrap.Modal(document.getElementById("winnerModal"));
modal.show();

return;

}

currentPlayer=currentPlayer=="X"?"O":"X";

document.getElementById("status").innerHTML=
currentPlayer=="X"
?"Player 1 (X) Turn"
:"Player 2 (O) Turn";

}

function restartGame(){

board=["","","","","","","","",""];

currentPlayer="X";

gameRunning=true;

document.getElementById("status").innerHTML="Player 1 (X) Turn";

cells.forEach(cell=>{
cell.innerHTML="";
});

let modal=bootstrap.Modal.getInstance(document.getElementById("winnerModal"));

if(modal){
modal.hide();
}

}

</script>

</body>
</html>
